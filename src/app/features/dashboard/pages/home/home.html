<div class="container py-3">

    <h4 class="text-center mb-4">Cattle Dashboard</h4>

    <div class="row g-3">

        @for (item of categories$ | async; track item.type) {
        <div class="col-12">
            <div class="card dashboard-card" (click)="onCardClick(item)">

                <div class="d-flex align-items-center p-3">

                    <!-- ICON -->
                    <div class="icon-box me-3">

                        @if (item.type === 'cow') {
                        <img src="https://cdn-icons-png.flaticon.com/512/1998/1998610.png" />
                        }

                        @if (item.type === 'buffalo') {
                        <img src="https://cdn-icons-png.flaticon.com/512/185/185833.png" />
                        }

                        @if (item.type === 'goat') {
                        <img
                            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoIpox48v7tk24YyirlmI7Di6sFo5zHMjbHg&s" />
                        }

                    </div>

                    <!-- TEXT -->
                    <div class="flex-grow-1">
                        <h6 class="mb-1">{{ item.title }}</h6>
                        <small class="text-muted">Total: {{ item.count }}</small>
                    </div>
                    <div>
                        <i class="bi bi-chevron-right"></i>
                    </div>
                </div>

            </div>
        </div>
        }

    </div>

    <!-- Floating Add Button -->
    <button class="btn btn-primary fab-btn d-flex align-items-center justify-content-center" (click)="addCattle()">
        <i class="bi bi-plus-lg fs-4"></i>
    </button>
</div>
