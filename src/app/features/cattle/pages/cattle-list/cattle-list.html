<div class="container py-3">

  <!-- Header -->
  <div class="d-flex align-items-center mb-3">
    <i class="bi bi-arrow-left me-2" role="button" (click)="goBack()"></i>
    <h5 class="mb-0 text-capitalize">{{ type }} List</h5>
  </div>

  <!-- Loading -->
  <div *ngIf="!(cattleList$ | async)" class="text-center mt-4">
    Loading...
  </div>

  <!-- Data -->
  <ng-container *ngIf="cattleList$ | async as cattleList">

    <!-- No Data -->
    <div *ngIf="cattleList.length === 0" class="text-center mt-4 text-muted">
      No data found
    </div>

    <!-- List -->
    <div *ngFor="let item of cattleList; trackBy: trackById"
         class="card mb-2 p-2 list-card">

      <div class="d-flex align-items-center">

        <div class="avatar me-3" (click)="edit(item)">
          <span *ngIf="type === 'cow'">🐄</span>
          <span *ngIf="type === 'buffalo'">🐃</span>
          <span *ngIf="type === 'goat'">🐐</span>
        </div>

        <div class="flex-grow-1" (click)="goToEvents(item)">
          <div class="fw-bold">{{ item.name }}</div>
          <small class="text-muted">{{ item.dob }}</small>
        </div>

        <div class="d-flex gap-4">
          <i class="bi bi-pencil-square action-icon" (click)="edit(item)"></i>
          <i class="bi bi-trash action-icon text-danger" (click)="delete(item)"></i>
          <i class="bi bi-calendar-event action-icon text-primary" (click)="goToEvents(item)"></i>
        </div>

      </div>
    </div>

  </ng-container>

</div>
