<div class="container py-3">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="d-flex align-items-center gap-1">
            <i class="bi bi-arrow-left me-2" (click)="goBack()"></i>
            <h5 *ngIf="cattle$ | async as cattle" class="mb-0 text-capitalize">
                Events- [{{ cattle.name }} ]
            </h5>
        </div>
        <button class="btn btn-primary btn-sm" (click)="openModal()">
            + Add Event
        </button>
    </div>

    <!-- List -->
    <ng-container *ngIf="events$ | async as events">

        <div *ngIf="events.length === 0" class="text-center text-muted">
            No events found
        </div>

        <div *ngFor="let e of events" class="card mb-2 p-2">
            <div class="d-flex justify-content-between">
                <div>
                    <div class="fw-bold text-capitalize">
                        {{ e.name }} ({{ e.type }})
                    </div>
                    <small>Event Date: {{ e.date | date: 'dd-MMM-yyyy' }}</small>
                    <div class="text-muted small">{{ e.notes }}</div>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-trash text-danger" (click)="deleteEvent(e)"></i>
                    <i class="bi bi-pencil text-primary" (click)="openModal(e)"></i>
                </div>
            </div>
        </div>

    </ng-container>

</div>


<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <!-- Category -->
                <div class="mb-3">
                    <label class="form-label">Event Type <span class="text-danger">*</span></label>
                    <select class="form-select" [(ngModel)]="eventType">
                        <option value="">Select</option>
                        <option value="production">Production</option>
                        <option value="health">Health</option>
                    </select>
                </div>

                <!-- Sub Type -->
                <div class="mb-3" *ngIf="eventType">
                    <label class="form-label">Event<span class="text-danger">*</span></label>
                    <select class="form-select" [(ngModel)]="eventName">
                        <option value="">Select</option>

                        <ng-container *ngIf="eventType === 'production'">
                            <option value="inseminated">Inseminated</option>
                            <option value="pregnant">Pregnant</option>
                            <option value="birth">Gives Birth</option>
                            <option value="abortion">Abortion</option>
                        </ng-container>

                        <ng-container *ngIf="eventType === 'health'">
                            <option value="disease">Disease</option>
                            <option value="deworming">Deworming</option>
                            <option value="vaccination">Vaccination</option>
                        </ng-container>

                    </select>
                </div>

                <!-- Date -->
                <div class="mb-3">
                    <label class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" [max]="todayDate" [(ngModel)]="eventDate">
                </div>
                <!-- Notes -->
                <div class="mb-3">
                    <label class="form-label">Notes (Optional)</label>
                    <textarea class="form-control" rows="3"
                        placeholder="Add details like symptoms, medicine, remarks..." [(ngModel)]="eventNotes">
          </textarea>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" (click)="saveEvent()">Save</button>
            </div>

        </div>
    </div>
</div>
