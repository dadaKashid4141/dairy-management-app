<div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4 w-100" style="max-width: 400px;">

        <h3 class="text-center mb-3">Register</h3>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Enter Name" formControlName="name">
            </div>

            <div class="mb-3">
                <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="10" class="form-control"
                    placeholder="Enter Mobile Number" formControlName="mobile">
            </div>

            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Enter Email" formControlName="email">
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Enter Password" formControlName="password">
            </div>

            <button class="btn btn-success w-100" type="submit">Register</button>

            <div class="text-center mt-3">
                <small>
                    Already have account?
                    <span class="text-primary" role="button" (click)="goToLogin()">
                        Login
                    </span>
                </small>
            </div>

        </form>
    </div>
</div>
